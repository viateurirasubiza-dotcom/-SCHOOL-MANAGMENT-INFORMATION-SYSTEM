<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  addDoc,
  deleteDoc,
  doc,
  setDoc,
  getDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy....",
  authDomain: "neomis-77b36.firebaseapp.com",
  projectId: "neomis-77b36",
  storageBucket: "neomis-77b36.firebasestorage.app",
  messagingSenderId: "836047126207",
  appId: "1:836047126207:web:df890a577383585698100a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.db = db;

window.collection = collection;
window.getDocs = getDocs;
window.addDoc = addDoc;
window.deleteDoc = deleteDoc;
window.doc = doc;

window.load = async function load() {
  const snap = await getDocs(collection(db, "students"));

  let students = [];

  snap.forEach((d) => {
    students.push({ id: d.id, ...d.data() });
  });

  // save firebase data
  localStorage.setItem("students", JSON.stringify(students));

  // ALSO build classStudents automatically (IMPORTANT FIX)
  let grouped = {};

  students.forEach(s => {
    if (!grouped[s.class]) {
      grouped[s.class] = [];
    }
    if (!grouped[s.class].includes(s.name)) {
      grouped[s.class].push(s.name);
    }
  });

  window.classStudents = grouped;
  localStorage.setItem("classStudents", JSON.stringify(grouped));

  // render table (HOD)
  let html = "";

  students.forEach(s => {
    html += `
      <tr>
        <td>${s.name}</td>
        <td>${s.class}</td>
        <td>${s.sdms || "-"}</td>
        <td>${s.term}</td>
        <td>
          <button class="action-btn view-btn" onclick="view('${s.id}')">View</button>
          <button class="action-btn delete-btn" onclick="deleteStudent('${s.id}')">Delete</button>
        </td>
      </tr>
    `;
  });

  const list = document.getElementById("list");
  if (list) list.innerHTML = html;
};
window.login = function () {
  try {

    const user = document.getElementById("username").value.trim();
    const pass = document.getElementById("password").value.trim();
    const subject = document.getElementById("subjectSelect").value;

    const subjectPasswords = {
      MATHEMATICS: "math123",
      ENGLISH: "eng123",
      IKINYARWANDA: "kinya123",
      SCIENCE: "sci123",
      "SOCIAL STUDIES": "social123",
      FRENCH: "french123",
      "P.E": "pe123",
      "C.A": "ca123"
    };

    if (user === "teacher") {

      if (!subject) {
        alert("Select subject");
        return;
      }

      if (subjectPasswords[subject] !== pass) {
        alert("Wrong Subject Password");
        return;
      }

      localStorage.setItem("role", "teacher");
      localStorage.setItem("teacherSubject", subject);

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("teacherSystem").style.display = "block";
      document.getElementById("hodSystem").style.display = "none";

      window.filterTeacherSubject?.();
    }

    else if (user === "hod" && pass === "1234") {

      localStorage.setItem("role", "hod");

      document.getElementById("loginPage").style.display = "none";
      document.getElementById("teacherSystem").style.display = "none";
      document.getElementById("hodSystem").style.display = "block";

      window.load?.();
    }

    else {
      alert("Wrong Login");
    }

  } catch (err) {
    console.error(err);
    alert("Login error - check console");
  }
};
window.logout = function logout() {

  // clear session
  localStorage.removeItem("role");
  localStorage.removeItem("teacherSubject");

  // reset UI
  document.getElementById("loginPage").style.display = "block";
  document.getElementById("teacherSystem").style.display = "none";
  document.getElementById("hodSystem").style.display = "none";

  // clear content
  const marks = document.getElementById("marks");
  const list = document.getElementById("list");
  const report = document.getElementById("report");

  if (marks) marks.innerHTML = "";
  if (list) list.innerHTML = "";
  if (report) report.innerHTML = "";

  // reset inputs (optional but important)
  document.getElementById("username").value = "";
  document.getElementById("password").value = "";
  document.getElementById("subjectSelect").value = "";

  // DO NOT reload page (this was breaking it)
};

window.filterTeacherSubject = function () {

  let teacherSubject = localStorage.getItem("teacherSubject");
  let cls = document.getElementById("class").value;

  let container = document.getElementById("marks");
  container.innerHTML = "";

  if (!cls) return;

  let students = window.classStudents?.[cls] || [];

  if (students.length === 0) {
    container.innerHTML = "<p style='color:red'>No students in this class</p>";
    return;
  }

  let limit = (teacherSubject === "P.E" || teacherSubject === "C.A") ? 10 : 50;

  students.forEach((student, index) => {

    container.innerHTML += `
      <div style="background:white;padding:10px;margin:8px;border-radius:10px;color:black;">
        <h3>${student}</h3>

        <label>Mid / ${limit}</label>
        <input type="number" id="mid_${index}" min="0" max="${limit}">

        <label>Exam / ${limit}</label>
        <input type="number" id="exam_${index}" min="0" max="${limit}">
      </div>
    `;
  });
};
window.addStudentToClass = function () {

  let name = document.getElementById("newStudentName").value.trim();
  let cls = document.getElementById("newStudentClass").value;

  if (!name || !cls) {
    alert("Enter student name and class");
    return;
  }

  // ensure classStudents exists
  if (!window.classStudents) {
    window.classStudents = {};
  }

  if (!window.classStudents[cls]) {
    window.classStudents[cls] = [];
  }

  // prevent duplicates
  if (window.classStudents[cls].includes(name)) {
    alert("Student already exists");
    return;
  }

  window.classStudents[cls].push(name);

  // SAVE to localStorage
  localStorage.setItem("classStudents", JSON.stringify(window.classStudents));

  // CLEAR inputs
  document.getElementById("newStudentName").value = "";
  document.getElementById("newStudentClass").value = "";

  alert("Student added successfully ✔");

  // IMPORTANT: refresh marks system if class selected
  if (typeof window.filterTeacherSubject === "function") {
    window.filterTeacherSubject();
  }

  console.log("Updated classStudents:", window.classStudents);
};
window.saveAllStudents = async function saveAllStudents() {

  let cls = document.getElementById("class").value;
  let term = document.getElementById("term").value;
  let teacherSubject = localStorage.getItem("teacherSubject");

  if (!cls) {
    alert("Select Class");
    return;
  }

  let students = window.classStudents?.[cls];

  if (!students || students.length === 0) {
    alert("No students in this class");
    return;
  }

  const limit =
    (teacherSubject === "P.E" || teacherSubject === "C.A")
    ? 10 : 50;

  try {

    // GET OLD DATA
    const snap = await getDocs(collection(db, "students"));

    let existingStudents = [];

    snap.forEach(d => {
      existingStudents.push({
        firebaseId: d.id,
        ...d.data()
      });
    });

    for (let i = 0; i < students.length; i++) {

      let student = students[i];

      let mid =
        Number(document.getElementById(`mid_${i}`).value) || 0;

      let exam =
        Number(document.getElementById(`exam_${i}`).value) || 0;

      if (mid > limit || exam > limit) {
        alert(student + " exceeds limit");
        return;
      }

      // CHECK EXISTING RECORD
      let existing = existingStudents.find(s =>
        s.name === student &&
        s.class === cls &&
        s.term === term
      );

      if (existing) {

        // UPDATE SUBJECT ONLY
        existing.marks = existing.marks || {};

        existing.marks[teacherSubject] = {
          mid,
          exam
        };

        await setDoc(
          doc(db, "students", existing.firebaseId),
          existing
        );

      } else {

        // CREATE NEW STUDENT
        let newData = {

          name: student,
          class: cls,
          term: term,
          sdms: "",

          marks: {
            [teacherSubject]: {
              mid,
              exam
            }
          },

          createdAt: Date.now()
        };

        await addDoc(
          collection(db, "students"),
          newData
        );
      }
    }

    alert("Marks Saved Successfully ✔");

    await load();

  } catch (err) {

    console.error(err);

    alert("Save Error");
  }
};
window.buildReportCard = function (s, terms, position, outOf) {

  let subjects = ["MATHEMATICS","ENGLISH","IKINYARWANDA","SCIENCE","SOCIAL STUDIES","FRENCH","P.E","C.A"];

  let marks = s.marks || {};

  let rows = "";

  subjects.forEach(sub => {

    let m = marks[sub] || { mid: 0, exam: 0 };

    let total = (m.mid || 0) + (m.exam || 0);

    rows += `
      <tr>
        <td style="text-align:left">${sub}</td>
        <td>${m.mid}</td>
        <td>${m.exam}</td>
        <td>${total}</td>
      </tr>
    `;
  });

  return `
    <div class="report">

      <div style="text-align:center;">
        <img src="${localStorage.getItem('schoolLogo') || ''}" 
        style="width:80px;height:80px;object-fit:contain;">
        <div class="header-top">PUPIL REPORT CARD</div>
      </div>

      <div class="line-input">
        NAME <span>${s.name}</span>
        CLASS <span>${s.class}</span>
      </div>

      <div class="line-input">
        TERM VIEW <span>${terms.join(" + ")}</span>
      </div>

      <div class="line-input">
        POSITION <span>${position}</span>
        OUT OF <span>${outOf}</span>

window.buildTable = function(all, terms) {

let isAnnual = terms.length === 3;

let html = `<table class="table-report">
<tr><th>SUBJECT</th>`;

// headers
terms.forEach(t => {
html += `<th colspan="5">${t}</th>`;
});

if (isAnnual) html += `<th colspan="2">ANNUAL AVG</th>`;

html += `</tr><tr><th></th>`;

// sub headers
terms.forEach(() => {
html += `<th>MID</th><th>EXAM</th><th>TOTAL</th><th>AVG %</th><th>REMARK</th>`;
});

if (isAnnual) html += `<th>AVG %</th><th>REMARK</th>`;

html += `</tr>`;

// subjects list
let subjects = [
"MATHEMATICS","ENGLISH","IKINYARWANDA","SCIENCE",
"SOCIAL STUDIES","FRENCH","P.E","C.A"
];

// totals per term
let grand = {};
terms.forEach(t => grand[t] = 0);

// loop subjects
subjects.forEach(sub => {

html += `<tr><td class="subject-col">${sub}</td>`;

let annualSum = 0;
let annualCount = 0;

terms.forEach(term => {

// 🔥 FIREBASE FILTER (IMPORTANT FIX)
let records = all.filter(x => x.term === term);

let mid = 0;
let exam = 0;

records.forEach(r => {
if (r.marks && r.marks[sub]) {
mid += Number(r.marks[sub].mid || 0);
exam += Number(r.marks[sub].exam || 0);
}
});

let total = mid + exam;

// max mark logic
let max = (sub === "P.E" || sub === "C.A") ? 20 : 100;
let avg = max > 0 ? Math.round((total / max) * 100) : 0;

grand[term] += avg;
annualSum += avg;
annualCount++;

html += `
<td>${mid}</td>
<td>${exam}</td>
<td>${total}</td>
<td>${avg}%</td>
<td>${remark(avg)}</td>
`;

});

if (isAnnual) {

let annAvg = Math.round(annualSum / annualCount);

html += `
<td>${annAvg}%</td>
<td>${remark(annAvg)}</td>
`;
}

html += `</tr>`;
});

// TOTAL ROW
html += `<tr><td><b>TOTAL AVG</b></td>`;

terms.forEach(term => {

let avg = Math.round(grand[term] / subjects.length);
if (avg > 100) avg = 100;

html += `
<td colspan="4">${avg}%</td>
<td>${remark(avg)}</td>
`;
});

if (isAnnual) {

let annTotal = 0;

terms.forEach(t => {
annTotal += Math.round(grand[t] / subjects.length);
});

let annAvg = Math.round(annTotal / terms.length);
if (annAvg > 100) annAvg = 100;

html += `
<td>${annAvg}%</td>
<td>${remark(annAvg)}</td>
`;
}

html += `</tr></table>`;

return html;
};
window.remark = function (avg) {

if (avg >= 80) return "Excellent";
else if (avg >= 70) return "Very Good";
else if (avg >= 60) return "Good";
else if (avg >= 50) return "Fair";
else return "Poor";

};
window.rank = function (students, cls, terms) {

  let filtered = students.filter(s => s.class === cls);

  let map = {};

  filtered.forEach(s => {

    let key = s.sdms || s.name;

    if (!map[key]) {
      map[key] = {
        student: s,
        total: 0
      };
    }

    let marks = s.marks || {};

    // sum ALL subjects properly
    Object.keys(marks).forEach(sub => {
      let m = marks[sub] || { mid: 0, exam: 0 };
      map[key].total += (Number(m.mid) + Number(m.exam));
    });

  });

  let arr = Object.values(map);

  // ❗ normalize ranking (NO fake percentage)
  arr.sort((a, b) => b.total - a.total);

  return arr;
};

  let total = 0;
